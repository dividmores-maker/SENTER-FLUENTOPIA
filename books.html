<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حجز الكتب الدراسية</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            margin-bottom: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            color: #667eea;
            font-size: 28px;
        }

        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
            margin-left: 5px;
        }

        .btn:hover {
            transform: translateY(-2px);
        }

        .btn-warning {
            background: #ffc107;
            color: #333;
        }

        .btn-success {
            background: #28a745;
        }

        .btn-info {
            background: #17a2b8;
        }

        .stats-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 25px;
        }

        .stat-box {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 3px 10px rgba(0,0,0,0.1);
            text-align: center;
        }

        .stat-box .number {
            font-size: 32px;
            font-weight: bold;
            color: #667eea;
        }

        .stat-box .label {
            color: #666;
            margin-top: 5px;
            font-size: 13px;
        }

        .content {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }

        .filter-section {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
            margin-bottom: 25px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
        }

        .filter-section select {
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
        }

        .books-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .book-card {
            background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
            padding: 20px;
            border-radius: 12px;
            border-right: 4px solid #667eea;
            transition: all 0.3s ease;
        }

        .book-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.15);
        }

        .book-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 2px solid #e0e0e0;
        }

        .book-icon {
            font-size: 48px;
        }

        .book-info h3 {
            color: #333;
            font-size: 18px;
            margin-bottom: 5px;
        }

        .book-info p {
            color: #666;
            font-size: 13px;
        }

        .book-details {
            margin-bottom: 15px;
        }

        .detail-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            font-size: 14px;
        }

        .detail-label {
            color: #666;
        }

        .detail-value {
            color: #333;
            font-weight: bold;
        }

        .book-status {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
        }

        .status-available {
            background: #d4edda;
            color: #155724;
        }

        .status-unavailable {
            background: #f8d7da;
            color: #721c24;
        }

        .book-actions {
            display: flex;
            gap: 10px;
        }

        .book-actions button {
            flex: 1;
            padding: 10px;
            font-size: 14px;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 15px;
            width: 90%;
            max-width: 500px;
        }

        .modal-content.large {
            max-width: 1000px;
            max-height: 85vh;
            overflow-y: auto;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #e0e0e0;
        }

        .modal-header h2 {
            color: #667eea;
        }

        .close-btn {
            background: none;
            border: none;
            font-size: 28px;
            cursor: pointer;
            color: #999;
        }

        .close-btn:hover {
            color: #333;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #333;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
        }

        .alert {
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-weight: bold;
        }

        .alert-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .alert-danger {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .report-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        .report-table th,
        .report-table td {
            padding: 12px;
            text-align: right;
            border: 1px solid #e0e0e0;
        }

        .report-table th {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-weight: bold;
        }

        .report-table tbody tr:hover {
            background: #f8f9fa;
        }

        .report-summary {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            margin-top: 20px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }

        .summary-item {
            text-align: center;
        }

        .summary-item .value {
            font-size: 24px;
            font-weight: bold;
            color: #667eea;
        }

        .summary-item .label {
            color: #666;
            font-size: 13px;
            margin-top: 5px;
        }

        @media print {
            body { background: white; }
            .header, .btn, .modal-header button { display: none !important; }
            .modal { display: block !important; position: relative; background: white; }
            .modal-content { box-shadow: none; max-height: none; }
        }

        /* Firebase Status Bar */
        .firebase-bar { display:flex; align-items:center; gap:10px; padding:10px 18px; border-radius:10px; margin-bottom:20px; font-size:13px; font-weight:bold; transition:all .3s; }
        .firebase-bar.connected  { background:#d4edda; color:#155724; border:2px solid #28a745; }
        .firebase-bar.error      { background:#f8d7da; color:#721c24; border:2px solid #dc3545; }
        .firebase-bar.connecting { background:#fff3cd; color:#856404; border:2px solid #ffc107; }
        .firebase-bar.saving     { background:#e3f2fd; color:#1565c0; border:2px solid #2196f3; }
        .firebase-dot { width:12px; height:12px; border-radius:50%; flex-shrink:0; }
        .firebase-dot.connected  { background:#28a745; box-shadow:0 0 8px #28a745; animation:fbBlink 2s infinite; }
        .firebase-dot.error      { background:#dc3545; }
        .firebase-dot.connecting { background:#ffc107; animation:fbBlink .6s infinite; }
        .firebase-dot.saving     { background:#2196f3; animation:fbBlink .4s infinite; }
        @keyframes fbBlink { 0%,100%{opacity:1} 50%{opacity:.3} }
    </style>
</head>

    <div class="container">
        <div class="header">
            <div>
                <h1>📚 حجز الكتب الدراسية</h1>
                <p style="color: #999; margin-top: 5px;">إدارة حجز الكتب للمراحل الدراسية</p>
            </div>
            <div>
                <button class="btn btn-info" onclick="showSetPricesModal()">💰 تحديد الأسعار</button>
            </div>
        </div>

        <div id="alertContainer"></div>

        <!-- Firebase Status Bar -->
        <div class="firebase-bar connecting" id="firebaseStatusBar">
            <div class="firebase-dot connecting" id="firebaseDot"></div>
            <span id="firebaseMsg">🔌 جاري الاتصال بـ Firebase...</span>
        </div>

        <div class="stats-row">
            <div class="stat-box">
                <div class="number" id="totalBooks">0</div>
                <div class="label">إجمالي الكتب</div>
            </div>
            <div class="stat-box">
                <div class="number" id="availableBooks">0</div>
                <div class="label">كتب متاحة</div>
            </div>
            <div class="stat-box">
                <div class="number" id="reservedBooks">0</div>
                <div class="label">كتب محجوزة</div>
            </div>
            <div class="stat-box">
                <div class="number" id="totalReservations">0</div>
                <div class="label">إجمالي الحجوزات</div>
            </div>
            <div class="stat-box">
                <div class="number" id="totalRevenue">0</div>
                <div class="label">إجمالي الإيرادات (ج)</div>
            </div>
        </div>

        <div class="content">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h2 style="color: #333;">📖 الكتب المتاحة</h2>
                <button class="btn btn-success" onclick="showReservationsModal()">📋 عرض الحجوزات</button>
            </div>

            <div class="filter-section">
                <select id="stageFilter" onchange="filterBooks()">
                    <option value="">جميع المراحل</option>
                    <option value="primary">الابتدائية</option>
                    <option value="preparatory">الإعدادية</option>
                </select>
                <select id="gradeFilter" onchange="filterBooks()">
                    <option value="">جميع الصفوف</option>
                    <optgroup label="المرحلة الابتدائية">
                        <option value="1">الأول الابتدائي</option>
                        <option value="2">الثاني الابتدائي</option>
                        <option value="3">الثالث الابتدائي</option>
                        <option value="4">الرابع الابتدائي</option>
                        <option value="5">الخامس الابتدائي</option>
                        <option value="6">السادس الابتدائي</option>
                    </optgroup>
                    <optgroup label="المرحلة الإعدادية">
                        <option value="7">الأول الإعدادي</option>
                        <option value="8">الثاني الإعدادي</option>
                        <option value="9">الثالث الإعدادي</option>
                    </optgroup>
                </select>
                <select id="subjectFilter" onchange="filterBooks()">
                    <option value="">جميع المواد</option>
                    <option value="math">رياضيات</option>
                    <option value="arabic">لغة عربية</option>
                    <option value="english">لغة إنجليزية</option>
                    <option value="science">علوم</option>
                    <option value="social">دراسات اجتماعية</option>
                    <option value="religion">تربية دينية</option>
                </select>
            </div>

            <div class="books-grid" id="booksGrid"></div>
        </div>
    </div>

    <div class="modal" id="reserveModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>📚 حجز كتاب</h2>
                <button class="close-btn" onclick="closeModal('reserveModal')">&times;</button>
            </div>
            <form onsubmit="makeReservation(event)">
                <input type="hidden" id="reserveBookId">
                <div class="form-group">
                    <label>اسم الطالب</label>
                    <input type="text" id="studentName" placeholder="أدخل اسم الطالب" required>
                </div>
                <div class="form-group">
                    <label>رقم الهاتف</label>
                    <input type="tel" id="studentPhone" placeholder="01xxxxxxxxx" pattern="[0-9]{11}" required>
                </div>
                <div class="form-group">
                    <label>عدد النسخ</label>
                    <input type="number" id="bookQuantity" min="1" value="1" required>
                </div>
                <div class="form-group">
                    <label>المبلغ المدفوع</label>
                    <input type="number" id="paidAmount" min="0" placeholder="اترك فارغاً للدفع الكامل">
                </div>
                <div id="totalPriceDisplay" style="background: #f8f9fa; padding: 15px; border-radius: 8px; margin-bottom: 15px; text-align: center;">
                    <strong style="color: #667eea; font-size: 18px;">الإجمالي: <span id="totalPrice">0</span> جنيه</strong>
                </div>
                <div style="display: flex; gap: 10px; margin-top: 20px;">
                    <button type="submit" class="btn" style="flex: 1;">✔ تأكيد الحجز</button>
                    <button type="button" class="btn btn-warning" style="flex: 1;" onclick="closeModal('reserveModal')">إلغاء</button>
                </div>
            </form>
        </div>
    </div>

    <div class="modal" id="setPricesModal">
        <div class="modal-content large">
            <div class="modal-header">
                <h2>💰 تحديد أسعار الكتب</h2>
                <button class="close-btn" onclick="closeModal('setPricesModal')">&times;</button>
            </div>
            <div id="pricesList"></div>
            <div style="margin-top: 20px;">
                <button class="btn btn-success" style="width: 100%;" onclick="savePrices()">✔ حفظ الأسعار</button>
            </div>
        </div>
    </div>

    <div class="modal" id="reservationsModal">
        <div class="modal-content large">
            <div class="modal-header">
                <h2>📋 تقرير الحجوزات</h2>
                <button class="close-btn" onclick="closeModal('reservationsModal')">&times;</button>

            </div>

            <div id="reservationsList"></div>
        </div>

            { id:37, name:'لغة عربية',        grade:9, gradeName:'الثالث الإعدادي',  stage:'preparatory', subject:'arabic',  available:50, reserved:0, price:115 },
            { id:38, name:'لغة إنجليزية',     grade:9, gradeName:'الثالث الإعدادي',  stage:'preparatory', subject:'english', available:50, reserved:0, price:110 },
            { id:39, name:'علوم',            grade:9, gradeName:'الثالث الإعدادي',  stage:'preparatory', subject:'science', available:50, reserved:0, price:115 },
            { id:40, name:'دراسات اجتماعية', grade:9, gradeName:'الثالث الإعدادي',  stage:'preparatory', subject:'social',  available:50, reserved:0, price:110 },
        ];

        let books        = JSON.parse(JSON.stringify(booksDefault));
        let reservations = [];

        // ── Save to Firestore ──
        async function saveData() {
            setFbStatus('saving', '💾 جاري الحفظ...');
            try {
                await setDoc(doc(db, 'books', 'data'), { books, reservations });
                setFbStatus('connected', '🔥 Firebase — تم الحفظ ✔');
            } catch(e) {
                setFbStatus('error', '❌ خطأ في الحفظ — ' + e.message);
            }
        }

        // ── Migration localStorage → Firestore ──
        async function migrateIfNeeded() {
            const lb = localStorage.getItem('school_books_data');
            const lr = localStorage.getItem('school_reservations_data');
            if (!lb && !lr) return;
            try {
                const snap = await getDoc(doc(db, 'books', 'data'));
                if (!snap.exists()) {
                    await setDoc(doc(db, 'books', 'data'), {
                        books:        lb ? JSON.parse(lb) : books,
                        reservations: lr ? JSON.parse(lr) : []
                    });
                }
                localStorage.removeItem('school_books_data');
                localStorage.removeItem('school_reservations_data');
            } catch(e) { console.warn('Migration error:', e); }
        }

        // ── Realtime Listener ──
        function startListener() {
            onSnapshot(doc(db, 'books', 'data'), (snap) => {
                if (snap.exists()) {
                    books        = snap.data().books        || JSON.parse(JSON.stringify(booksDefault));
                    reservations = snap.data().reservations || [];
                } else {
                    books        = JSON.parse(JSON.stringify(booksDefault));
                    reservations = [];
                    saveData();
                }
                setFbStatus('connected', '🔥 Firebase متصل — البيانات محدّثة لحظياً');
                renderBooks();
            }, (err) => {
                setFbStatus('error', '❌ خطأ في الاتصال — تأكد من Firebase Rules');
            });
        }

        function showAlert(message, type = 'success') {
            const alertDiv = document.createElement('div');
            alertDiv.className = `alert alert-${type}`;
            alertDiv.textContent = message;
            const container = document.getElementById('alertContainer');
            container.innerHTML = '';
            container.appendChild(alertDiv);
            setTimeout(() => alertDiv.remove(), 3000);
        }

        function updateStats() {
            const totalBooks     = books.length;
            const availableBooks = books.filter(b => b.available > 0).length;
            const totalReserved  = reservations.reduce((sum, r) => sum + r.quantity, 0);
            const totalRevenue   = reservations.reduce((sum, r) => sum + (r.paidAmount || 0), 0);
            document.getElementById('totalBooks').textContent        = totalBooks;
            document.getElementById('availableBooks').textContent    = availableBooks;
            document.getElementById('reservedBooks').textContent     = totalReserved;
            document.getElementById('totalReservations').textContent = reservations.length;
            document.getElementById('totalRevenue').textContent      = totalRevenue.toLocaleString();
        }

        function renderBooks() {
            const grid          = document.getElementById('booksGrid');
            const stageFilter   = document.getElementById('stageFilter').value;
            const gradeFilter   = document.getElementById('gradeFilter').value;
            const subjectFilter = document.getElementById('subjectFilter').value;

            let filtered = books;
            if (stageFilter)   filtered = filtered.filter(b => b.stage === stageFilter);
            if (gradeFilter)   filtered = filtered.filter(b => b.grade === parseInt(gradeFilter));
            if (subjectFilter) filtered = filtered.filter(b => b.subject === subjectFilter);

            grid.innerHTML = '';

            if (filtered.length === 0) {
                grid.innerHTML = '<p style="text-align:center;color:#999;grid-column:1/-1;padding:40px;">لا توجد كتب متاحة</p>';
                updateStats();
                return;
            }

            filtered.forEach(book => {
                const statusText  = book.available > 0 ? `متاح (${book.available})` : 'غير متاح';
                const statusClass = book.available > 0 ? 'status-available' : 'status-unavailable';
                const card = document.createElement('div');
                card.className = 'book-card';
                card.innerHTML = `
                    <div class="book-header">
                        <div class="book-icon">📖</div>
                        <div class="book-info">
                            <h3>${book.name}</h3>
                            <p>${book.gradeName}</p>
                        </div>
                    </div>
                    <div class="book-details">
                        <div class="detail-item">
                            <span class="detail-label">السعر:</span>
                            <span class="detail-value">${book.price} جنيه</span>
                        </div>
                        <div class="detail-item">
                            <span class="detail-label">الحالة:</span>
                            <span class="book-status ${statusClass}">${statusText}</span>
                        </div>
                        <div class="detail-item">
                            <span class="detail-label">المحجوز:</span>
                            <span class="detail-value">${book.reserved} نسخة</span>
                        </div>
                    </div>
                    <div class="book-actions">
                        <button class="btn ${book.available > 0 ? 'btn-success' : ''}"
                                onclick="showReserveModal(${book.id})"
                                ${book.available === 0 ? 'disabled' : ''}>
                            ${book.available > 0 ? '📚 حجز' : '❌ غير متاح'}
                        </button>
                    </div>
                `;
                grid.appendChild(card);
            });

            updateStats();
        }

        function filterBooks() { renderBooks(); }

        function showSetPricesModal() {
            const list = document.getElementById('pricesList');
            list.innerHTML = '';
            const grouped = {};
            books.forEach(b => { if (!grouped[b.gradeName]) grouped[b.gradeName] = []; grouped[b.gradeName].push(b); });
            Object.keys(grouped).forEach(gradeName => {
                const sec = document.createElement('div');
                sec.style.cssText = 'margin-bottom:30px;padding:20px;background:#f8f9fa;border-radius:10px;';
                let html = `<h3 style="color:#667eea;margin-bottom:15px;">${gradeName}</h3>`;
                grouped[gradeName].forEach(b => {
                    html += `<div class="form-group"><label>${b.name}</label><input type="number" id="price_${b.id}" value="${b.price}" min="0" placeholder="السعر بالجنيه"></div>`;
                });
                sec.innerHTML = html;
                list.appendChild(sec);
            });
            document.getElementById('setPricesModal').classList.add('active');
        }

        function savePrices() {
            books.forEach(b => {
                const input = document.getElementById(`price_${b.id}`);
                if (input) { const p = parseInt(input.value); if (p > 0) b.price = p; }
            });
            saveData();
            showAlert('تم حفظ الأسعار بنجاح! ✔');
            closeModal('setPricesModal');
            renderBooks();
        }

        function showReserveModal(bookId) {
            document.getElementById('reserveBookId').value  = bookId;
            document.getElementById('studentName').value    = '';
            document.getElementById('studentPhone').value   = '';
            document.getElementById('bookQuantity').value   = '1';
            document.getElementById('paidAmount').value     = '';
            updateTotalPrice();
            document.getElementById('bookQuantity').addEventListener('input', updateTotalPrice);
            document.getElementById('reserveModal').classList.add('active');
        }

        function updateTotalPrice() {
            const bookId   = parseInt(document.getElementById('reserveBookId').value);
            const quantity = parseInt(document.getElementById('bookQuantity').value) || 0;
            const book     = books.find(b => b.id === bookId);
            if (book) document.getElementById('totalPrice').textContent = (book.price * quantity).toLocaleString();
        }

        function makeReservation(e) {
            e.preventDefault();
            const bookId      = parseInt(document.getElementById('reserveBookId').value);
            const studentName = document.getElementById('studentName').value;
            const studentPhone = document.getElementById('studentPhone').value;
            const quantity    = parseInt(document.getElementById('bookQuantity').value);
            const paidAmount  = parseFloat(document.getElementById('paidAmount').value) || 0;
            const book        = books.find(b => b.id === bookId);
            const totalPrice  = book.price * quantity;

            if (quantity > book.available) { showAlert('عدد النسخ المطلوب أكبر من المتاح!', 'danger'); return; }
            if (paidAmount > totalPrice)   { showAlert('المبلغ المدفوع أكبر من الإجمالي!', 'danger'); return; }

            book.available -= quantity;
            book.reserved  += quantity;

            const remaining     = totalPrice - paidAmount;
            const paymentStatus = paidAmount === 0 ? 'not_paid' : (remaining === 0 ? 'paid' : 'partial');

            reservations.push({
                id: Date.now(), bookId, bookName: book.name, grade: book.gradeName,
                studentName, studentPhone, quantity, price: book.price,
                totalPrice, paidAmount, remainingAmount: remaining,
                paymentStatus, date: new Date().toISOString(), status: 'confirmed'
            });

            saveData();
            let msg = `تم حجز ${quantity} نسخة من كتاب ${book.name} بنجاح! ✓`;
            if (paymentStatus === 'partial')  msg += `\nتم دفع ${paidAmount} جنيه - المتبقي: ${remaining} جنيه`;
            if (paymentStatus === 'not_paid') msg += `\nلم يتم الدفع - المبلغ المطلوب: ${totalPrice} جنيه`;
            showAlert(msg);
            closeModal('reserveModal');
            renderBooks();
        }

        function showReservationsModal() {
            const list = document.getElementById('reservationsList');
            list.innerHTML = '';

            if (reservations.length === 0) {
                list.innerHTML = '<p style="text-align:center;color:#999;padding:40px;">لا توجد حجوزات</p>';
                document.getElementById('reservationsModal').classList.add('active');
                return;
            }

            const gradeGroups = {};
            reservations.forEach(res => { if (!gradeGroups[res.grade]) gradeGroups[res.grade] = []; gradeGroups[res.grade].push(res); });

            const sortedGrades = Object.keys(gradeGroups).sort((a, b) => {
                const mA = a.match(/\d+/), mB = b.match(/\d+/);
                return (!mA || !mB) ? 0 : parseInt(mA[0]) - parseInt(mB[0]);
            });

            let cardsHTML = '<div style="margin-bottom:30px;">';
            sortedGrades.forEach(grade => {
                const gr           = gradeGroups[grade];
                const studentCount = new Set(gr.map(r => r.studentName)).size;
                const totalBooks   = gr.reduce((s, r) => s + r.quantity, 0);
                const totalRev     = gr.reduce((s, r) => s + (r.paidAmount || 0), 0);
                const gid          = grade.replace(/\s/g, '_');

                cardsHTML += `
                    <div style="background:linear-gradient(135deg,#f8f9fa,#e9ecef);padding:20px;border-radius:12px;margin-bottom:15px;border-right:4px solid #667eea;cursor:pointer;transition:all 0.3s;"
                         onmouseover="this.style.transform='translateY(-3px)';this.style.boxShadow='0 6px 20px rgba(0,0,0,0.15)';"
                         onmouseout="this.style.transform='translateY(0)';this.style.boxShadow='none';"
                         onclick="toggleGradeDetails('${grade}')">
                        <div style="display:flex;justify-content:space-between;align-items:center;">
                            <div>
                                <h3 style="color:#667eea;margin-bottom:10px;font-size:20px;">📚 ${grade}</h3>
                                <div style="display:flex;gap:20px;color:#666;">
                                    <span><strong>${studentCount}</strong> طالب</span>
                                    <span><strong>${totalBooks}</strong> كتاب</span>
                                    <span><strong>${totalRev.toLocaleString()}</strong> جنيه</span>
                                </div>
                            </div>
                            <div style="font-size:24px;color:#667eea;" id="arrow_${gid}">▼</div>
                        </div>
                        <div id="details_${gid}" style="display:none;margin-top:20px;padding-top:20px;border-top:2px solid #e0e0e0;">
                            <table class="report-table">
                                <thead>
                                    <tr><th>#</th><th>الطالب</th><th>الهاتف</th><th>الكتاب</th><th>العدد</th><th>السعر</th><th>الإجمالي</th><th>المدفوع</th><th>المتبقي</th><th>حالة الدفع</th><th>التاريخ</th><th>الإجراءات</th></tr>
                                </thead>
                                <tbody>
                                    ${gr.map((res, i) => {
                                        const date   = new Date(res.date).toLocaleDateString('ar-EG');
                                        const stText = res.paymentStatus === 'paid' ? 'مدفوع بالكامل' : res.paymentStatus === 'partial' ? 'دفع جزئي' : 'لم يدفع';
                                        const stCol  = res.paymentStatus === 'paid' ? '#28a745' : res.paymentStatus === 'partial' ? '#ffc107' : '#dc3545';
                                        return `<tr>
                                            <td>${i+1}</td><td>${res.studentName}</td><td>${res.studentPhone}</td><td>${res.bookName}</td>
                                            <td>${res.quantity}</td><td>${res.price} ج</td><td>${res.totalPrice} ج</td><td>${res.paidAmount||0} ج</td>
                                            <td><strong style="color:${res.remainingAmount>0?'#dc3545':'#28a745'}">${res.remainingAmount||0} ج</strong></td>
                                            <td><span style="background:${stCol};color:white;padding:4px 8px;border-radius:12px;font-size:11px;">${stText}</span></td>
                                            <td>${date}</td>
                                            <td>
                                                ${res.remainingAmount > 0 ? `<button class="btn btn-success" style="padding:4px 8px;font-size:11px;margin-left:5px;" onclick="event.stopPropagation();payRemaining(${res.id})">💰 دفع</button>` : ''}
                                                <button class="btn" style="padding:4px 8px;font-size:11px;background:#dc3545;" onclick="event.stopPropagation();cancelReservation(${res.id})">❌ إلغاء</button>
                                            </td>
                                        </tr>`;
                                    }).join('')}
                                </tbody>
                            </table>
                        </div>
                    </div>`;
            });
            cardsHTML += '</div>';

            const totalQty  = reservations.reduce((s, r) => s + r.quantity, 0);
            const totalRev  = reservations.reduce((s, r) => s + (r.paidAmount||0), 0);
            const totalSt   = new Set(reservations.map(r => r.studentName)).size;
            cardsHTML += `
                <div class="report-summary">
                    <div class="summary-item"><div class="value">${sortedGrades.length}</div><div class="label">عدد الصفوف</div></div>
                    <div class="summary-item"><div class="value">${totalSt}</div><div class="label">إجمالي الطلاب</div></div>
                    <div class="summary-item"><div class="value">${totalQty}</div><div class="label">إجمالي الكتب</div></div>
                    <div class="summary-item"><div class="value">${totalRev.toLocaleString()} ج</div><div class="label">إجمالي الإيرادات</div></div>
                </div>`;

            list.innerHTML = cardsHTML;
            document.getElementById('reservationsModal').classList.add('active');
        }

        function toggleGradeDetails(grade) {
            const gid     = grade.replace(/\s/g, '_');
            const details = document.getElementById('details_' + gid);
            const arrow   = document.getElementById('arrow_'   + gid);
            if (!details) return;
            const isHidden = details.style.display === 'none';
            details.style.display = isHidden ? 'block' : 'none';
            arrow.textContent     = isHidden ? '▲' : '▼';
        }

        function cancelReservation(reservationId) {
            if (!confirm('هل أنت متأكد من إلغاء هذا الحجز؟')) return;
            const res  = reservations.find(r => r.id === reservationId);
            const book = books.find(b => b.id === res.bookId);
            book.available   += res.quantity;
            book.reserved    -= res.quantity;
            reservations      = reservations.filter(r => r.id !== reservationId);
            saveData();
            showAlert('تم إلغاء الحجز بنجاح!');
            showReservationsModal();
            renderBooks();
        }

        function payRemaining(reservationId) {
            const res = reservations.find(r => r.id === reservationId);
            if (!res) return;
            const amount = prompt(`المبلغ المتبقي: ${res.remainingAmount} جنيه\nأدخل المبلغ المدفوع:`);
            if (!amount) return;
            const paidNow = parseFloat(amount);
            if (isNaN(paidNow) || paidNow <= 0) { showAlert('الرجاء إدخال مبلغ صحيح!', 'danger'); return; }
            if (paidNow > res.remainingAmount)   { showAlert('المبلغ أكبر من المتبقي!', 'danger'); return; }
            res.paidAmount      += paidNow;
            res.remainingAmount -= paidNow;
            res.paymentStatus    = res.remainingAmount === 0 ? 'paid' : 'partial';
            showAlert(res.remainingAmount === 0 ? 'تم دفع المبلغ بالكامل! ✓' : `تم دفع ${paidNow} جنيه - المتبقي: ${res.remainingAmount} جنيه`);
            saveData();
            showReservationsModal();
            renderBooks();
        }

        function closeModal(modalId) {
            document.getElementById(modalId).classList.remove('active');
        }

        window.onclick = function(event) {
            if (event.target.classList.contains('modal')) event.target.classList.remove('active');
        };

        // تصدير للـ window
        window.filterBooks           = filterBooks;
        window.showSetPricesModal    = showSetPricesModal;
        window.savePrices            = savePrices;
        window.showReserveModal      = showReserveModal;
        window.updateTotalPrice      = updateTotalPrice;
        window.makeReservation       = makeReservation;
        window.showReservationsModal = showReservationsModal;
        window.toggleGradeDetails    = toggleGradeDetails;
        window.cancelReservation     = cancelReservation;
        window.payRemaining          = payRemaining;
        window.closeModal            = closeModal;

        // Init
        setFbStatus('connecting', '🔌 جاري الاتصال بـ Firebase...');
        migrateIfNeeded().then(() => startListener());
    </script>
</body>
</html>
