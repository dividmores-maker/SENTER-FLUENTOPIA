<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جدول الحصص وإدارة الفصول</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
        }

        .header {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            margin-bottom: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .header h1 {
            color: #667eea;
            font-size: 28px;
        }

        .header-buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
            text-decoration: none;
            display: inline-block;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }

        .btn-secondary {
            background: #6c757d;
            box-shadow: 0 4px 15px rgba(108, 117, 125, 0.4);
        }

        .btn-danger {
            background: #dc3545;
            box-shadow: 0 4px 15px rgba(220, 53, 69, 0.4);
        }

        .btn-success {
            background: #28a745;
            box-shadow: 0 4px 15px rgba(40, 167, 69, 0.4);
        }

        .btn-warning {
            background: #ffc107;
            color: #333;
            box-shadow: 0 4px 15px rgba(255, 193, 7, 0.4);
        }

        .schedule-container {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            overflow-x: auto;
        }

        .schedule-table {
            width: 100%;
            border-collapse: collapse;
            min-width: 1000px;
        }

        .schedule-table th {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px;
            text-align: center;
            font-size: 16px;
        }

        .schedule-table th:first-child {
            border-radius: 10px 0 0 0;
        }

        .schedule-table th:last-child {
            border-radius: 0 10px 0 0;
        }

        .schedule-table td {
            padding: 12px;
            border: 1px solid #e0e0e0;
            text-align: center;
            vertical-align: top;
            min-height: 100px;
        }

        .time-cell {
            background: #f8f9fa;
            font-weight: bold;
            color: #667eea;
            font-size: 14px;
        }

        .session-card {
            background: linear-gradient(135deg, #e3f2fd 0%, #bbdefb 100%);
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 5px;
            cursor: pointer;
            transition: all 0.3s ease;
            border-right: 4px solid #2196f3;
        }

        .session-card:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 12px rgba(33, 150, 243, 0.3);
        }

        .session-card.math {
            background: linear-gradient(135deg, #fff3e0 0%, #ffe0b2 100%);
            border-right-color: #ff9800;
        }

        .session-card.science {
            background: linear-gradient(135deg, #e8f5e9 0%, #c8e6c9 100%);
            border-right-color: #4caf50;
        }

        .session-card.english {
            background: linear-gradient(135deg, #f3e5f5 0%, #e1bee7 100%);
            border-right-color: #9c27b0;
        }

        .session-card.arabic {
            background: linear-gradient(135deg, #fce4ec 0%, #f8bbd0 100%);
            border-right-color: #e91e63;
        }

        .session-card.social {
            background: linear-gradient(135deg, #e0f2f1 0%, #b2dfdb 100%);
            border-right-color: #009688;
        }

        .session-card.religion {
            background: linear-gradient(135deg, #f3e5f5 0%, #e1bee7 100%);
            border-right-color: #673ab7;
        }

        .session-card.computer {
            background: linear-gradient(135deg, #e8eaf6 0%, #c5cae9 100%);
            border-right-color: #3f51b5;
        }

        .session-title {
            font-weight: bold;
            font-size: 13px;
            margin-bottom: 4px;
        }

        .session-info {
            font-size: 11px;
            color: #555;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 15px;
            width: 90%;
            max-width: 600px;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #e0e0e0;
        }

        .modal-header h2 {
            color: #667eea;
        }

        .close-btn {
            background: none;
            border: none;
            font-size: 28px;
            cursor: pointer;
            color: #999;
        }

        .close-btn:hover {
            color: #333;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #333;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 80px;
        }

        .form-group small {
            display: block;
            margin-top: 5px;
            color: #666;
            font-size: 12px;
        }

        .classes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 15px;
            margin-top: 25px;
        }

        .class-card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 3px 10px rgba(0,0,0,0.1);
            border-right: 4px solid #667eea;
            transition: all 0.3s ease;
        }

        .class-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.15);
        }

        .class-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .class-name {
            font-size: 18px;
            font-weight: bold;
            color: #333;
        }

        .class-capacity {
            background: #e3f2fd;
            color: #2196f3;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
        }

        .class-info {
            color: #666;
            font-size: 14px;
            margin-bottom: 8px;
        }

        .class-actions {
            display: flex;
            gap: 8px;
            margin-top: 15px;
        }

        .class-actions button {
            flex: 1;
            padding: 8px;
            font-size: 12px;
        }

        .alert {
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-weight: bold;
        }

        .alert-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .alert-danger {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        /* ── Firebase Status Bar ── */
        .firebase-bar {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 18px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 13px;
            font-weight: bold;
            transition: all .3s;
        }
        .firebase-bar.connected    { background:#d4edda; color:#155724; border:2px solid #28a745; }
        .firebase-bar.error        { background:#f8d7da; color:#721c24; border:2px solid #dc3545; }
        .firebase-bar.connecting   { background:#fff3cd; color:#856404; border:2px solid #ffc107; }
        .firebase-bar.saving       { background:#e3f2fd; color:#1565c0; border:2px solid #2196f3; }
        .firebase-dot {
            width:12px; height:12px; border-radius:50%; flex-shrink:0;
        }
        .firebase-dot.connected    { background:#28a745; box-shadow:0 0 8px #28a745; animation:fbBlink 2s infinite; }
        .firebase-dot.error        { background:#dc3545; }
        .firebase-dot.connecting   { background:#ffc107; animation:fbBlink .6s infinite; }
        .firebase-dot.saving       { background:#2196f3; animation:fbBlink .4s infinite; }
        @keyframes fbBlink { 0%,100%{opacity:1} 50%{opacity:.3} }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div>
                <h1>📅 جدول الحصص وإدارة الفصول</h1>
            </div>
            <div class="header-buttons">
                <button class="btn" onclick="showAddSessionModal()">➕ إضافة حصة</button>

    <!-- Add/Edit Session Modal -->

        <div class="modal-content">
            <div class="modal-header">

                        <option value="arabic">لغة عربية</option>

                        <option value="science">علوم</option>

                </div>
                <div class="form-group">
                    <label>الصف</label>
                    <select id="sessionClass" required>
                        <option value="">اختر الصف</option>
                        <optgroup label="المرحلة الابتدائية">
                            <option value="grade1">الأول الابتدائي</option>
                            <option value="grade2">الثاني الابتدائي</option>
                            <option value="grade3">الثالث الابتدائي</option>

                <div class="form-group">

                        <option value="d1">قاعة D1</option>

                        <option value="e1">قاعة E1</option>

                </div>
                <div class="form-group">
                    <label>اليوم</label>
                    <select id="sessionDay" required>
                        <option value="">اختر اليوم</option>
                        <option value="0">السبت</option>

            <form id="classForm" onsubmit="saveClass(event)">

                <div class="form-group">
                    <label>السعة القصوى</label>

                    <label>المرحلة الدراسية</label>

    <script type="module">
        const days = ['السبت', 'الأحد', 'الاثنين', 'الثلاثاء', 'الأربعاء', 'الخميس'];
        const daysInEnglish = ['Saturday', 'Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday'];
        
        // دالة لحساب تاريخ اليوم بناءً على رقم اليوم في الأسبوع
        function getDateForDay(dayIndex) {
            const today = new Date();
            const currentDay = today.getDay(); // 0 = Sunday, 1 = Monday, etc.
            
            // تحويل من نظامنا (0 = Saturday) إلى نظام JavaScript (0 = Sunday)
            const targetDay = dayIndex === 0 ? 6 : dayIndex - 1;
            
            // حساب الفرق بين اليوم الحالي واليوم المستهدف
            let diff = targetDay - currentDay;
            
            // إذا كان اليوم المستهدف قد مضى هذا الأسبوع، اذهب للأسبوع القادم
            if (diff < 0) {
                diff += 7;
            }
            
            const targetDate = new Date(today);
            targetDate.setDate(today.getDate() + diff);
            
            return targetDate.toISOString().split('T')[0]; // YYYY-MM-DD
        }
        
        // دالة لتنسيق التاريخ بالعربية
        function formatArabicDate(dateString) {
            const date = new Date(dateString);
            const day = date.getDate();
            const month = date.getMonth() + 1;
            const year = date.getFullYear();
            return `${day}/${month}/${year}`;
        }
        
        const subjectNames = {
            math: 'رياضيات',
            arabic: 'لغة عربية',
            english: 'لغة إنجليزية',
            science: 'علوم',
            social: 'دراسات اجتماعية',
            religion: 'تربية دينية',
            computer: 'حاسب آلي'
        };

        const teacherNames = {
            t1: 'أ. محمد أحمد',
            t2: 'أ. فاطمة علي',
            t3: 'أ. خالد محمود',
            t4: 'أ. سارة حسن',
            t5: 'أ. نور الدين',
            t6: 'أ. منى إبراهيم'
        };

        const classNames = {
            grade1: 'الأول الابتدائي',
            grade2: 'الثاني الابتدائي',
            grade3: 'الثالث الابتدائي',
            grade4: 'الرابع الابتدائي',
            grade5: 'الخامس الابتدائي',
            grade6: 'السادس الابتدائي',
            grade7: 'الأول الإعدادي',
            grade8: 'الثاني الإعدادي',
            grade9: 'الثالث الإعدادي'
        };

        const roomNames = {
            a1: 'A1', a2: 'A2', b1: 'B1', b2: 'B2', c1: 'C1',
            c2: 'C2', d1: 'D1', d2: 'D2', e1: 'E1'
        };

        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
        import { getFirestore, doc, onSnapshot, setDoc, getDoc } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';

        // ══════════════════════════════════════════
        //  Firebase Config
        // ══════════════════════════════════════════
        const firebaseConfig = {
            apiKey: "AIzaSyAZCGljrXbTP38-MZwzsxOZ8HK34Fykk8o",
            authDomain: "senter-4e169.firebaseapp.com",
            projectId: "senter-4e169",
            storageBucket: "senter-4e169.firebasestorage.app",
            messagingSenderId: "235178743750",
            appId: "1:235178743750:web:e4419cfea51a404f2e44c7"
        };

        const app = initializeApp(firebaseConfig);
        const db  = getFirestore(app);

        // ── Firebase Status ─────────────────────
        function setFbStatus(state, msg) {
            const bar = document.getElementById('firebaseStatusBar');
            const dot = document.getElementById('firebaseDot');
            const txt = document.getElementById('firebaseMsg');
            if (!bar) return;
            bar.className = 'firebase-bar ' + state;
            dot.className = 'firebase-dot ' + state;
            txt.textContent = msg;
        }

        // ══════════════════════════════════════════
        //  Migration: localStorage → Firestore (مرة واحدة)
        // ══════════════════════════════════════════
        async function migrateIfNeeded() {
            const localSessions = localStorage.getItem('scheduleSessions');
            const localClasses  = localStorage.getItem('scheduleClasses');

            if (localSessions || localClasses) {
                try {
                    const snap = await getDoc(doc(db, 'schedule', 'data'));
                    // فقط نقل لو Firestore فاضي
                    if (!snap.exists()) {
                        await setDoc(doc(db, 'schedule', 'data'), {
                            sessions:      localSessions ? JSON.parse(localSessions) : [],
                            classes:       localClasses  ? JSON.parse(localClasses)  : defaultClasses(),
                            nextSessionId: parseInt(localStorage.getItem('nextSessionId') || '1'),
                            nextClassId:   parseInt(localStorage.getItem('nextClassId')   || '10')
                        });
                        console.log('✅ تم نقل البيانات لـ Firebase');
                    }
                    // امسح localStorage بعد النقل
                    localStorage.removeItem('scheduleSessions');
                    localStorage.removeItem('scheduleClasses');
                    localStorage.removeItem('nextSessionId');
                    localStorage.removeItem('nextClassId');
                } catch(e) { console.warn('Migration error:', e); }
            }
        }

        // ══════════════════════════════════════════
        //  Save to Firestore
        // ══════════════════════════════════════════
        async function saveScheduleData() {
            setFbStatus('saving', '💾 جاري الحفظ على Firebase...');
            try {
                await setDoc(doc(db, 'schedule', 'data'), {
                    sessions,
                    classes,
                    nextSessionId,
                    nextClassId
                });
                setFbStatus('connected', '🔥 Firebase — تم الحفظ ✔');
            } catch(e) {
                console.error('Save error:', e);
                setFbStatus('error', '❌ خطأ في الحفظ — ' + e.message);
            }
        }

        // ══════════════════════════════════════════
        //  Realtime Listener
        // ══════════════════════════════════════════
        function startListener() {
            onSnapshot(
                doc(db, 'schedule', 'data'),
                (snap) => {
                    if (snap.exists()) {
                        const data = snap.data();
                        sessions      = data.sessions      || [];
                        classes       = data.classes       || defaultClasses();
                        nextSessionId = data.nextSessionId || 1;
                        nextClassId   = data.nextClassId   || 10;
                    } else {
                        // أول مرة — استخدم الـ defaults
                        sessions      = [];
                        classes       = defaultClasses();
                        nextSessionId = 1;
                        nextClassId   = 10;
                        // احفظ الـ defaults في Firestore
                        saveScheduleData();
                    }
                    setFbStatus('connected', '🔥 Firebase متصل — البيانات محدّثة لحظياً');
                    renderSchedule();
                },
                (err) => {
                    console.error('Listener error:', err);
                    setFbStatus('error', '❌ خطأ في الاتصال — تأكد من Firebase Rules');
                }
            );
        }

        // ══════════════════════════════════════════
        //  Default Classes Data
        // ══════════════════════════════════════════
        function defaultClasses() {
            return [
                { id: 1, name: 'الصف الأول الابتدائي - أ',    room: 'A1', capacity: 25, enrolled: 22, level: 1 },
                { id: 2, name: 'الصف الثاني الابتدائي - أ',   room: 'A2', capacity: 25, enrolled: 23, level: 2 },
                { id: 3, name: 'الصف الثالث الابتدائي - أ',   room: 'B1', capacity: 28, enrolled: 26, level: 3 },
                { id: 4, name: 'الصف الرابع الابتدائي - أ',   room: 'B2', capacity: 28, enrolled: 25, level: 4 },
                { id: 5, name: 'الصف الخامس الابتدائي - أ',   room: 'C1', capacity: 30, enrolled: 28, level: 5 },
                { id: 6, name: 'الصف السادس الابتدائي - أ',   room: 'C2', capacity: 30, enrolled: 29, level: 6 },
                { id: 7, name: 'الصف الأول الإعدادي - أ',     room: 'D1', capacity: 32, enrolled: 30, level: 7 },
                { id: 8, name: 'الصف الثاني الإعدادي - أ',    room: 'D2', capacity: 32, enrolled: 31, level: 8 },
                { id: 9, name: 'الصف الثالث الإعدادي - أ',    room: 'E1', capacity: 35, enrolled: 33, level: 9 }
            ];
        }

        // ══════════════════════════════════════════
        //  State
        // ══════════════════════════════════════════
        let sessions      = [];
        let classes       = defaultClasses();
        let nextClassId   = 10;
        let nextSessionId = 1;

        // ── Init ────────────────────────────────
        setFbStatus('connecting', '🔌 جاري الاتصال بـ Firebase...');
        migrateIfNeeded().then(() => startListener());

        function formatTime(time) {
            const [hours, minutes] = time.split(':');
            const hour = parseInt(hours);
            let period = 'صباحاً';
            if (hour >= 12 && hour < 17) period = 'ظهراً';
            else if (hour >= 17) period = 'مساءً';
            const displayHour = hour > 12 ? hour - 12 : hour;
            return `${displayHour}:${minutes} ${period}`;
        }

        function showAlert(message, type = 'success') {
            const alertDiv = document.createElement('div');
            alertDiv.className = `alert alert-${type}`;
            alertDiv.textContent = message;
            const container = document.getElementById('alertContainer');
            container.innerHTML = '';
            container.appendChild(alertDiv);
            setTimeout(() => alertDiv.remove(), 3000);
        }

        function renderSchedule() {
            const tbody = document.getElementById('scheduleBody');
            tbody.innerHTML = '';

            const allTimes = new Set();
            sessions.forEach(s => allTimes.add(`${s.startTime}-${s.endTime}`));
            const sortedTimes = Array.from(allTimes).sort();

            if (sortedTimes.length === 0) {
                const defaultSlots = [
                    '14:00-16:00', '16:00-18:00', '18:00-20:00', '20:00-21:00'
                ];
                defaultSlots.forEach(slot => {
                    const [start, end] = slot.split('-');
                    const row = document.createElement('tr');
                    const timeCell = document.createElement('td');
                    timeCell.className = 'time-cell';
                    timeCell.textContent = `${formatTime(start)} - ${formatTime(end)}`;
                    row.appendChild(timeCell);
                    for (let day = 0; day < 6; day++) {
                        row.appendChild(document.createElement('td'));
                    }
                    tbody.appendChild(row);
                });
            } else {
                sortedTimes.forEach(timeRange => {
                    const [start, end] = timeRange.split('-');
                    const row = document.createElement('tr');
                    const timeCell = document.createElement('td');
                    timeCell.className = 'time-cell';
                    timeCell.textContent = `${formatTime(start)} - ${formatTime(end)}`;
                    row.appendChild(timeCell);

                    for (let day = 0; day < 6; day++) {
                        const cell = document.createElement('td');
                        const daySessions = sessions.filter(s => 
                            s.day === day && `${s.startTime}-${s.endTime}` === timeRange
                        );
                        
                        daySessions.forEach(session => {
                            // إضافة التاريخ للجلسة إذا لم يكن موجوداً
                            if (!session.date) {
                                session.date = getDateForDay(session.day);
                            }
                            
                            const card = document.createElement('div');
                            card.className = `session-card ${session.subject}`;
                            card.onclick = () => showSessionDetails(session);
                            card.innerHTML = `
                                <div class="session-title">${subjectNames[session.subject]}</div>
                                <div class="session-info">${classNames[session.class]} • ${roomNames[session.room]}</div>
                                <div class="session-info">${teacherNames[session.teacher]}</div>
                                <div class="session-info" style="font-size: 10px; color: #777; margin-top: 4px;">📅 ${formatArabicDate(session.date)}</div>
                            `;
                            cell.appendChild(card);
                        });

                        row.appendChild(cell);
                    }
                    tbody.appendChild(row);
                });
            }
            
            // تحديث التواريخ بدون حفظ (الحفظ يتم عند التعديل الفعلي)
        }

        function showAddSessionModal() {
            document.getElementById('sessionModalTitle').textContent = '➕ إضافة حصة جديدة';
            document.getElementById('sessionForm').reset();
            document.getElementById('sessionId').value = '';
            document.getElementById('addSessionModal').classList.add('active');
        }

        function showEditSessionModal(session) {
            document.getElementById('sessionModalTitle').textContent = '✏️ تعديل الحصة';
            document.getElementById('sessionId').value = session.id;
            document.getElementById('sessionSubject').value = session.subject;
            document.getElementById('sessionClass').value = session.class;
            document.getElementById('sessionTeacher').value = session.teacher;
            document.getElementById('sessionRoom').value = session.room;
            document.getElementById('sessionDay').value = session.day;
            document.getElementById('sessionStartTime').value = session.startTime;
            document.getElementById('sessionEndTime').value = session.endTime;
            document.getElementById('sessionNotes').value = session.notes || '';
            document.getElementById('addSessionModal').classList.add('active');
        }

        function saveSession(e) {
            e.preventDefault();
            
            const startTime = document.getElementById('sessionStartTime').value;
            const endTime = document.getElementById('sessionEndTime').value;
            const startHour = parseInt(startTime.split(':')[0]);
            const endHour = parseInt(endTime.split(':')[0]);
            const endMinute = parseInt(endTime.split(':')[1]);

            if (startHour < 0 || (endHour > 24) || (endHour === 24 && endMinute > 0)) {
                showAlert('يجب أن تكون الحصة بين 2 ظهراً و 9 مساءً', 'danger');
                return;
            }

            if (startTime >= endTime) {
                showAlert('وقت النهاية يجب أن يكون بعد وقت البداية', 'danger');
                return;
            }

            const sessionId = document.getElementById('sessionId').value;
            const day = parseInt(document.getElementById('sessionDay').value);
            
            const sessionData = {
                id: sessionId ? parseInt(sessionId) : nextSessionId++,
                subject: document.getElementById('sessionSubject').value,
                class: document.getElementById('sessionClass').value,
                teacher: document.getElementById('sessionTeacher').value,
                room: document.getElementById('sessionRoom').value,
                day: day,
                startTime: startTime,
                endTime: endTime,
                notes: document.getElementById('sessionNotes').value,
                date: getDateForDay(day) // إضافة التاريخ تلقائياً
            };

            if (sessionId) {
                const index = sessions.findIndex(s => s.id === parseInt(sessionId));
                sessions[index] = sessionData;
                saveScheduleData();
                showAlert('تم تعديل الحصة بنجاح! ✔');
            } else {
                sessions.push(sessionData);
                saveScheduleData();
                showAlert('تم إضافة الحصة بنجاح! ✔');
            }

            closeModal('addSessionModal');
            renderSchedule();
        }

        function showSessionDetails(session) {
            const content = `
                <div style="padding: 20px 0;">
                    <h3 style="color: #667eea; margin-bottom: 20px;">${subjectNames[session.subject]} - ${classNames[session.class]}</h3>
                    
                    <div style="background: #f8f9fa; padding: 15px; border-radius: 8px; margin-bottom: 15px;">
                        <div style="margin-bottom: 10px;"><strong>اليوم:</strong> ${days[session.day]}</div>
                        <div style="margin-bottom: 10px;"><strong>التاريخ:</strong> ${formatArabicDate(session.date || getDateForDay(session.day))}</div>
                        <div style="margin-bottom: 10px;"><strong>الوقت:</strong> ${formatTime(session.startTime)} - ${formatTime(session.endTime)}</div>
                        <div style="margin-bottom: 10px;"><strong>القاعة:</strong> ${roomNames[session.room]}</div>
                        <div style="margin-bottom: 10px;"><strong>المدرس:</strong> ${teacherNames[session.teacher]}</div>
                        ${session.notes ? `<div><strong>ملاحظات:</strong> ${session.notes}</div>` : ''}
                    </div>

                    <div style="display: flex; gap: 10px; margin-top: 20px;">
                        <button class="btn" style="flex: 1;" onclick='showEditSessionModal(${JSON.stringify(session).replace(/'/g, "\\'")})'>✏️ تعديل</button>
                        <button class="btn btn-danger" style="flex: 1;" onclick="deleteSession(${session.id})">🗑️ حذف</button>
                        <button class="btn btn-secondary" style="flex: 1;" onclick="closeModal('sessionDetailsModal')">إغلاق</button>
                    </div>
                </div>
            `;
            document.getElementById('sessionDetailsContent').innerHTML = content;
            document.getElementById('sessionDetailsModal').classList.add('active');
        }

        function deleteSession(sessionId) {
            if(confirm('هل أنت متأكد من حذف هذه الحصة؟')) {
                sessions = sessions.filter(s => s.id !== sessionId);
                saveScheduleData();
                showAlert('تم حذف الحصة بنجاح!', 'success');
                closeModal('sessionDetailsModal');
                renderSchedule();
            }
        }

        function toggleClassesSection() {
            const scheduleSection = document.getElementById('scheduleSection');
            const classesSection = document.getElementById('classesSection');
            
            if (classesSection.style.display === 'none') {
                scheduleSection.style.display = 'none';
                classesSection.style.display = 'block';
                renderClasses();
            } else {
                scheduleSection.style.display = 'block';
                classesSection.style.display = 'none';
            }
        }

        function renderClasses() {
            const grid = document.getElementById('classesGrid');
            grid.innerHTML = `
                <div style="grid-column: 1 / -1; display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                    <h2 style="color: white;">🏫 الفصول المتاحة</h2>
                    <div style="display: flex; gap: 10px;">
                        <button class="btn" onclick="showAddClassModal()">➕ إضافة فصل</button>
                        <button class="btn btn-secondary" onclick="toggleClassesSection()">← عودة للجدول</button>
                    </div>
                </div>
            `;
            
            classes.forEach(cls => {
                const occupancy = Math.round((cls.enrolled / cls.capacity) * 100);
                const card = `
                    <div class="class-card">
                        <div class="class-header">
                            <div class="class-name">${cls.name}</div>
                            <div class="class-capacity">${cls.enrolled}/${cls.capacity}</div>
                        </div>
                        <div class="class-info">📍 ${cls.room}</div>
                        <div class="class-info">📊 نسبة الإشغال: ${occupancy}%</div>
                        <div style="background: #f0f0f0; border-radius: 10px; height: 8px; margin: 10px 0; overflow: hidden;">
                            <div style="background: ${occupancy > 90 ? '#e74c3c' : occupancy > 70 ? '#f39c12' : '#27ae60'}; height: 100%; width: ${occupancy}%;"></div>
                        </div>
                        <div class="class-actions">
                            <button class="btn" onclick="showEditClassModal(${cls.id})">✏️ تعديل</button>
                            <button class="btn btn-danger" onclick="deleteClass(${cls.id})">🗑️ حذف</button>
                        </div>
                    </div>
                `;
                grid.innerHTML += card;
            });
        }

        function showAddClassModal() {
            document.getElementById('classModalTitle').textContent = '🏫 إضافة فصل جديد';
            document.getElementById('classForm').reset();
            document.getElementById('classId').value = '';
            document.getElementById('classEnrolled').value = '0';
            document.getElementById('addClassModal').classList.add('active');
        }

        function showEditClassModal(classId) {
            const cls = classes.find(c => c.id === classId);
            if (!cls) return;

            document.getElementById('classModalTitle').textContent = '✏️ تعديل الفصل';
            document.getElementById('classId').value = cls.id;
            document.getElementById('className').value = cls.name;
            document.getElementById('classRoom').value = cls.room;
            document.getElementById('classCapacity').value = cls.capacity;
            document.getElementById('classEnrolled').value = cls.enrolled;
            document.getElementById('classLevel').value = cls.level;
            document.getElementById('addClassModal').classList.add('active');
        }

        function saveClass(e) {
            e.preventDefault();
            
            const classId = document.getElementById('classId').value;
            const classData = {
                id: classId ? parseInt(classId) : nextClassId++,
                name: document.getElementById('className').value,
                room: document.getElementById('classRoom').value,
                capacity: parseInt(document.getElementById('classCapacity').value),
                enrolled: parseInt(document.getElementById('classEnrolled').value),
                level: parseInt(document.getElementById('classLevel').value)
            };

            if (classId) {
                const index = classes.findIndex(c => c.id === parseInt(classId));
                classes[index] = classData;
                saveScheduleData();
                showAlert('تم تعديل الفصل بنجاح! ✔');
            } else {
                classes.push(classData);
                saveScheduleData();
                showAlert('تم إضافة الفصل بنجاح! ✔');
            }

            closeModal('addClassModal');
            renderClasses();
        }

        function deleteClass(classId) {
            if(confirm('هل أنت متأكد من حذف هذا الفصل؟')) {
                classes = classes.filter(c => c.id !== classId);
                saveScheduleData();
                showAlert('تم حذف الفصل بنجاح!', 'success');
                renderClasses();
            }
        }

        function closeModal(modalId) {
            document.getElementById(modalId).classList.remove('active');
        }

        window.onclick = function(event) {
            if (event.target.classList.contains('modal')) {
                event.target.classList.remove('active');
            }
        }

        // ══════════════════════════════════════════
        //  تصدير كل الدوال للـ window عشان onclick يشتغل
        // ══════════════════════════════════════════
        window.showAddSessionModal    = showAddSessionModal;
        window.showEditSessionModal   = showEditSessionModal;
        window.saveSession            = saveSession;
        window.showSessionDetails     = showSessionDetails;
        window.deleteSession          = deleteSession;
        window.toggleClassesSection   = toggleClassesSection;
        window.showAddClassModal      = showAddClassModal;
        window.showEditClassModal     = showEditClassModal;
        window.saveClass              = saveClass;
        window.deleteClass            = deleteClass;
        window.closeModal             = closeModal;

        // renderSchedule() يتم استدعاؤها تلقائياً من Firebase listener عند تحميل البيانات
    </script>
</body>
</html>
